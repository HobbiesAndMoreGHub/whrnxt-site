backend:
  name: github
  repo: HobbiesAndMoreGHub/whrnxt-site
  branch: main
  base_url: https://whrnxt.net
  auth_endpoint: /.netlify/functions/auth

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

site_url: https://whrnxt.net
display_url: https://whrnxt.net

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    description: "Blog posts shown at /articles. New ones appear automatically, newest first."
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{title}}  ·  {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "description", widget: "text", hint: "One line — shown on the /articles list and in search/social previews." }
      - { label: "Kicker", name: "kicker", widget: "string", default: "Guide", required: false, hint: "Small label above the title, e.g. Guide, How-to, Feature." }
      - { label: "Topics / tags", name: "topics", widget: "list", required: false, hint: "City names and themes — become filterable tags at /articles. e.g. Orlando, Food, Layovers." }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "trips"
    label: "Shared trips"
    description: "Approved trip links shown at /trips. Nothing appears on the site until you add it here."
    files:
      - name: "trips"
        label: "Shared trips list"
        file: "src/_data/trips.json"
        fields:
          - label: "Trips"
            name: "trips"
            widget: "list"
            label_singular: "Trip"
            summary: "{{fields.title}}  ·  {{fields.cities}}"
            fields:
              - { label: "Title", name: "title", widget: "string", hint: "e.g. A long weekend in Lisbon" }
              - { label: "Cities", name: "cities", widget: "string", required: false, hint: "Shown as the small label on the card. e.g. Lisbon, Sintra" }
              - { label: "Share link", name: "link", widget: "string", hint: "The WHRNXT share link submitted by the traveler." }
              - { label: "Note", name: "note", widget: "text", required: false, hint: "One line about the trip, optional." }

  - name: "settings"
    label: "Site settings"
    files:
      - name: "site"
        label: "Site info"
        file: "src/_data/site.json"
        description: "Name, tagline, and links used across the whole site."
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Site URL", name: "url", widget: "string" }
          - { label: "App URL", name: "appUrl", widget: "string" }
          - { label: "Contact email", name: "email", widget: "string" }
